# V3 template for class diagram generation.
#
# Purpose:
# - Keep config declarative and stable for long-term evolution.
# - Add runtime/parser/observability/output controls while preserving v2 mental model.
# - Use deterministic generation to keep diffs small across runs.

version: 3

diagram:
  # class | sequence
  type: class

runtime:
  # java | python | typescript | javascript
  language: java

  # legacy | tree-sitter | ast
  # Notes:
  # - java: prefer tree-sitter (or future spoon-bridge parser id once implemented)
  # - python: prefer ast
  # - typescript/javascript: parser id is platform-controlled in future iterations
  parser: tree-sitter

  # strict=false by default per current decision.
  # false: ignore unmatched include rules and continue.
  # true: fail generation when include rules resolve no targets.
  strict: false

  # Keep generated output deterministic.
  stable_sort:
    enabled: true
    # by_name keeps output stable and readable for reviews.
    strategy: by_name

  # Pin parser/tool versions for reproducible analysis across machines and CI.
  parser_lock_file: uml\parsers.lock.yaml

evidence:
  # off | basic | full
  # basic: matched list + high-level counts + key trace anchors.
  mode: basic

observability:
  # Emit summary counters (matched/excluded/expanded/unresolved).
  emit_summary: true

output:
  # plantuml is current production format.
  # mermaid is reserved for future output renderer.
  format: plantuml

  # Upsert behavior: create if not exists, overwrite content if exists.
  path: uml\your-plant-file.puml

# Depth for class expansion.
# Rule (current agreed behavior):
# - Member/dependency expansion follows this depth.
# - Inheritance (extends/implements) expansion may be treated as always-on chain by engine policy.
depth: 3

# Shared include/exclude rules can be imported from external files.
import:
  - uml\filter-v3.yaml

# class diagram visibility controls
method_scope: public
member_scope: none

# Source root for the selected runtime language.
src_root: 
  - src\main\java

include:
  # class short name
  - CategoryController

exclude:
  # class short name
  - DtoFactory
  # regex pattern
  - ".*Dto"
  # glob file pattern relative to workspace
  - src\main\...\dto\**\*.java

# Generated section (tool-owned). Keep empty in template.
matched: []
