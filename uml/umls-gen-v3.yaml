# V3 template for sequence diagram generation.
#
# Design goals:
# - Keep include/exclude simple and explicit.
# - Provide room for async/reactive evidence capture in later iterations.
# - Keep deterministic output and pinned parser/tool versions.

version: 3

diagram:
  # class | sequence
  type: sequence

runtime:
  # java | python | typescript | javascript
  language: java

  # legacy | tree-sitter | ast
  parser: tree-sitter

  # strict=false by default per current decision.
  strict: false

  stable_sort:
    enabled: true
    strategy: by_name

  parser_lock_file: uml/parsers.lock.yaml

evidence:
  # off | basic | full
  # basic is default by decision.
  mode: basic

  # Evidence anchors for sequence arrows.
  # Keep these enabled to simplify troubleshooting.
  include_caller: true
  include_callee: true
  include_source_line: true

observability:
  emit_summary: true

output:
  # Current default format.
  # Keep renderer-ready for future mermaid support.
  format: plantuml
  path: uml\your-plant-file.puml

# Cross-class call expansion depth.
depth: 5

import:
  - uml\filter-v3.yaml

src_root: 
  - src\main\java

# Async/reactive roadmap toggles (reserved fields, no-op until implemented):
async:
  # Python async/await and task scheduling traces.
  python:
    enable_async_await: true
    enable_task_scheduler: true

  # Java Spring WebFlux reactive chain traces.
  java:
    enable_webflux_chain: true

include:
  # class_name:method_name
  - FeedRefreshTaskGiver:process 

exclude: []

# User-defined concrete type preference for call resolution.
#
# Purpose:
# - This section guides method lookup when call-site qualifier type is abstract
#   (interface/base class) and multiple concrete implementations exist.
# - umls_gen picks the FIRST child path by YAML order for each parent.
# - Resolution is chain-based and prefers the most concrete type (leaf).
#
# Rules:
# - Keep each edge as direct extends/implements relation.
# - Do not put unrelated branches in one chain.
# - If a method/type is not covered here, umls_gen falls back to default lookup.
#
# Example structure (root -> child -> grandchild):
defined_hierarchy: []

# Tool-managed full hierarchy tree for all participant types.
#
# Ownership:
# - This section is GENERATED and FULLY OVERWRITTEN by umls_gen on each run.
# - Manual edits are ignored by design.
#
# Coverage:
# - Includes extends/implements relationships for classes/interfaces that
#   participate in current diagram call chain.
# - Traversal expands to the whole connected hierarchy component (not one branch).
available_type_hierarchy:
  []

# Generated section (tool-owned). Keep empty in template.
matched: []
